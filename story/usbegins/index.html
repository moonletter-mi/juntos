<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Us Begins</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#ffe0ef,#fff0f6);
}

.container{
    max-width:800px;
    margin:auto;
    padding:40px 20px;
}

.header{
    text-align:center;
    margin-bottom:40px;
}

.header h1{
    font-size:30px;
    color:#c65f88;
}

.header p{
    font-size:13px;
    color:#d87093;
    letter-spacing:2px;
    margin-top:5px;
}

.card{
    background:rgba(255,255,255,0.85);
    backdrop-filter:blur(15px);
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 15px 40px rgba(255,105,180,.12);
    margin-bottom:25px;
    animation:fadeIn 0.8s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

.card img{
    width:100%;
    height:320px;
    object-fit:cover;
    display:block;
}

.content{
    padding:15px;
    text-align:center;
}

.date{
    font-size:12px;
    color:#d87093;
    letter-spacing:2px;
}

.title{
    font-size:18px;
    font-weight:600;
    color:#c65f88;
    margin-top:5px;
}

.music{
    font-size:12px;
    color:#aaa;
    margin-top:6px;
}

.nav{
    display:flex;
    justify-content:space-between;
    margin-top:30px;
}

.btn{
    text-decoration:none;
    padding:12px 22px;
    border-radius:999px;
    font-weight:600;
    transition:.3s;
    font-size:14px;
}

.btn.prev{
    background:rgba(255,126,179,0.15);
    color:#c65f88;
}

.btn.prev:hover{
    background:rgba(255,126,179,0.25);
    transform:translateY(-3px);
}

.btn.next{
    background:#ff7eb3;
    color:white;
    box-shadow:0 10px 25px rgba(255,126,179,.25);
}

.btn.next:hover{
    background:#ff5f9d;
    transform:translateY(-3px);
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>Us Begins</h1>
        <p>THE MOMENTS WE BECAME "US"</p>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1529333166437-7750a6dd5a70">
        <div class="content">
            <div class="date">2023.03.01</div>
            <div class="title">Officially Us</div>
            <div class="music">♪ your special song</div>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e">
        <div class="content">
            <div class="date">2023.03.05</div>
            <div class="title">First Call</div>
            <div class="music">♪ late night voice</div>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1529333155574-9c2e8c6f5f29">
        <div class="content">
            <div class="date">2023.03.10</div>
            <div class="title">First Date</div>
            <div class="music">♪ nervous but happy</div>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e">
        <div class="content">
            <div class="date">2023.03.20</div>
            <div class="title">Comfort Zone</div>
            <div class="music">♪ slowly becoming us</div>
        </div>
    </div>

    <div class="nav">
    <a href="https://moonletter-mi.github.io/juntos/story/timeline/index.html" class="btn prev">← Prev</a>
    <a href="https://moonletter-mi.github.io/juntos/story/uni/index.html" class="btn next">Next →</a>
    </div>

</div>

</body>
</html>
