<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Memories</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#ffe0ef,#fff0f6);
}

.container{
    max-width:800px;
    margin:auto;
    padding:40px 20px;
}

.card{
    background:rgba(255,255,255,0.8);
    backdrop-filter:blur(15px);
    border-radius:20px;
    overflow:hidden;
    margin-bottom:25px;
    box-shadow:0 15px 40px rgba(255,105,180,.15);
    animation:fadeIn 0.8s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

.card img{
    width:100%;
    height:400px;
    object-fit:cover;
    display:block;
}

.content{
    padding:20px;
    text-align:center;
}

.date{
    font-size:13px;
    color:#d87093;
    letter-spacing:2px;
}

.title{
    font-size:20px;
    font-weight:600;
    color:#c65f88;
    margin-top:5px;
}

.music{
    font-size:12px;
    color:#999;
    margin-top:8px;
}

.nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:30px;
    padding:0 10px;
}

.btn{
    text-decoration:none;
    padding:12px 22px;
    border-radius:999px;
    font-weight:600;
    transition:.3s;
    display:inline-block;
    font-size:14px;
}

.btn.prev{
    background:rgba(255,126,179,0.15);
    color:#c65f88;
}

.btn.prev:hover{
    background:rgba(255,126,179,0.25);
    transform:translateY(-3px);
}

.btn.next{
    background:#ff7eb3;
    color:white;
    box-shadow:0 10px 25px rgba(255,126,179,.25);
}

.btn.next:hover{
    background:#ff5f9d;
    transform:translateY(-3px);
}
</style>
</head>

<body>

<div class="container">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1529333166437-7750a6dd5a70">
        <div class="content">
            <div class="date">2023.01.10</div>
            <div class="title">First Hello</div>
            <div class="music">♪ your fav song</div>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e">
        <div class="content">
            <div class="date">2023.02.18</div>
            <div class="title">Getting Closer</div>
            <div class="music">♪ same vibe</div>
        </div>
    </div>

    <div class="nav">
    <a href="https://moonletter-mi.github.io/juntos/" class="btn prev">← Prev</a>
    <a href="https://moonletter-mi.github.io/juntos/story/usbegins/index.html" class="btn next">Next →</a>
    </div>

</div>

</body>
</html>
